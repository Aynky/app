<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ぷよぷよ風ゲーム</title>
<style>
body{
  background:#222;
  color:white;
  text-align:center;
  font-family:sans-serif;
}

canvas{
  background:#111;
  margin-top:20px;
  border:3px solid white;
}
</style>
</head>
<body>

<h1>ぷよぷよ風ゲーム</h1>
<p>← → 移動 / ↓ 早く落とす / スペース 回転</p>

<canvas id="game" width="240" height="480"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const COLS = 6;
const ROWS = 12;
const SIZE = 40;

let board = Array.from({length:ROWS},()=>Array(COLS).fill(0));

const colors = ["","red","blue","green","yellow","purple"];

function newPair(){
  return {
    x:2,
    y:0,
    rot:0,
    colors:[
      Math.floor(Math.random()*5)+1,
      Math.floor(Math.random()*5)+1
    ]
  };
}

let pair = newPair();

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let y=0;y<ROWS;y++){
    for(let x=0;x<COLS;x++){
      if(board[y][x]){
        ctx.fillStyle=colors[board[y][x]];
        ctx.beginPath();
        ctx.arc(x*SIZE+SIZE/2,y*SIZE+SIZE/2,16,0,Math.PI*2);
        ctx.fill();
      }
    }
  }

  drawPair();
}

function drawPair(){
  const p = pair;

  const pos = [
    [p.x,p.y],
    getSecondPos()
  ];

  for(let i=0;i<2;i++){
    ctx.fillStyle=colors[p.colors[i]];
    ctx.beginPath();
    ctx.arc(pos[i][0]*SIZE+SIZE/2,pos[i][1]*SIZE+SIZE/2,16,0,Math.PI*2);
    ctx.fill();
  }
}

function getSecondPos(){
  const p = pair;

  if(p.rot===0) return [p.x,p.y-1];
  if(p.rot===1) return [p.x+1,p.y];
  if(p.rot===2) return [p.x,p.y+1];
  if(p.rot===3) return [p.x-1,p.y];
}

function collide(x,y){
  if(x<0||x>=COLS||y>=ROWS) return true;
  if(y>=0 && board[y][x]) return true;
  return false;
}

function move(dx){
  if(!collide(pair.x+dx,pair.y)){
    pair.x+=dx;
  }
}

function rotate(){
  pair.rot=(pair.rot+1)%4;
}

function drop(){
  pair.y++;

  const s = getSecondPos();

  if(collide(pair.x,pair.y) || collide(s[0],s[1])){
    pair.y--;

    place();
    clearGroups();
    pair=newPair();
  }
}

function place(){
  const s=getSecondPos();

  if(pair.y>=0) board[pair.y][pair.x]=pair.colors[0];
  if(s[1]>=0) board[s[1]][s[0]]=pair.colors[1];
}

function clearGroups(){

  const visited = Array.from({length:ROWS},()=>Array(COLS).fill(false));

  function dfs(x,y,color,list){
    if(x<0||x>=COLS||y<0||y>=ROWS) return;
    if(visited[y][x]) return;
    if(board[y][x]!==color) return;

    visited[y][x]=true;
    list.push([x,y]);

    dfs(x+1,y,color,list);
    dfs(x-1,y,color,list);
    dfs(x,y+1,color,list);
    dfs(x,y-1,color,list);
  }

  for(let y=0;y<ROWS;y++){
    for(let x=0;x<COLS;x++){

      if(board[y][x] && !visited[y][x]){

        let group=[];
        dfs(x,y,board[y][x],group);

        if(group.length>=4){
          group.forEach(p=>{
            board[p[1]][p[0]]=0;
          });
        }

      }
    }
  }

  gravity();
}

function gravity(){
  for(let x=0;x<COLS;x++){
    for(let y=ROWS-1;y>=0;y--){
      if(board[y][x]==0){
        for(let k=y-1;k>=0;k--){
          if(board[k][x]){
            board[y][x]=board[k][x];
            board[k][x]=0;
            break;
          }
        }
      }
    }
  }
}

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft") move(-1);
  if(e.key==="ArrowRight") move(1);
  if(e.key==="ArrowDown") drop();
  if(e.key===" ") rotate();
});

setInterval(()=>{
  drop();
  draw();
},500);

draw();
</script>

</body>
</html>
